<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phil Mitchell Radio Hour - Flashlight Sync</title>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue, onDisconnect } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        const firebaseConfig = {
            apiKey: "AIzaSyC_LXTw9P9EipLpXGguxh1bA0DT_dXFboQ",
            authDomain: "phil-mitchell-s-holy-light.firebaseapp.com",
            databaseURL: "https://phil-mitchell-s-holy-light-default-rtdb.firebaseio.com",
            projectId: "phil-mitchell-s-holy-light",
            storageBucket: "phil-mitchell-s-holy-light.firebasestorage.app",
            messagingSenderId: "269027793355",
            appId: "1:269027793355:web:ca5285d2f3e0bb406e3e4e"
        };
        const app = initializeApp(firebaseConfig);
        window.firebaseDb = getDatabase(app);
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseOnValue = onValue;
        window.firebaseOnDisconnect = onDisconnect;
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0;font-family:'Cinzel',serif;background:#000;color:#fff">
    <div id="root"></div>
    <script type="text/babel">
        const {useState,useEffect,useRef}=React;
        const PRESETS={gentle:{on:1000,off:1500,l:'Gentle'},slow:{on:800,off:1200,l:'Slow'},medium:{on:500,off:500,l:'Medium'},fast:{on:200,off:300,l:'Fast'},rapid:{on:100,off:150,l:'Rapid'},strobe:{on:50,off:100,l:'Strobe'},heartbeat:{on:300,off:700,l:'Heartbeat'},flicker:{on:150,off:200,l:'Flicker'},chaotic:{on:'r',off:'r',l:'Chaotic'}};
        
        const useFirebase=()=>{const[c,setC]=useState(false);const[a,setA]=useState(0);const[cmd,setCmd]=useState(null);useEffect(()=>{const i=setInterval(()=>{if(window.firebaseDb){clearInterval(i);setC(true);window.firebaseOnValue(window.firebaseRef(window.firebaseDb,'audience'),(s)=>setA(s.exists()?Object.keys(s.val()).length:0));window.firebaseOnValue(window.firebaseRef(window.firebaseDb,'command'),(s)=>{if(s.exists())setCmd(s.val())});}},100);return()=>clearInterval(i)},[]);const send=(d)=>{if(!window.firebaseDb)return;window.firebaseSet(window.firebaseRef(window.firebaseDb,'command'),{...d,ts:Date.now()})};const reg=(id)=>{if(!window.firebaseDb)return;const r=window.firebaseRef(window.firebaseDb,`audience/${id}`);window.firebaseSet(r,{j:Date.now()});window.firebaseOnDisconnect(r).remove()};return{c,a,cmd,send,reg}};
        
        const App=()=>{const[m,setM]=useState('choose');const[pw,setPw]=useState('');const[auth,setAuth]=useState(false);const[t,setT]=useState(null);const[flash,setFlash]=useState(false);const[seqs,setSeqs]=useState([]);const[saved,setSaved]=useState([]);const[run,setRun]=useState(false);const[tab,setTab]=useState('build');const[name,setName]=useState('');const runRef=useRef(false);const{c,a,cmd,send,reg}=useFirebase();
        
        useEffect(()=>{const s=localStorage.getItem('pm-seqs');if(s)setSaved(JSON.parse(s))},[]);
        useEffect(()=>{if(m==='audience'){const id='a'+Date.now();reg(id)}},[m]);
        
        const reqFlash=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});setT(s.getVideoTracks()[0])}catch(e){alert('Camera permission needed')}};
        const ctrlFlash=async(on)=>{if(!t)return;try{await t.applyConstraints({advanced:[{torch:on}]});setFlash(on)}catch(e){}};
        const execSeq=async(sq)=>{const p=()=>{const r=Math.random();if(sq.loc==='all')return true;if(sq.loc==='random-50')return r<0.5;if(sq.loc==='random-25')return r<0.25;return true};if(!p())return;if(sq.loc==='wave')await new Promise(r=>setTimeout(r,Math.random()*3000));const dur=sq.dur*1000;const end=Date.now()+dur;while(Date.now()<end){const pr=PRESETS[sq.preset];let onT=pr.on==='r'?Math.random()*300+50:pr.on;let offT=pr.off==='r'?Math.random()*300+50:pr.off;await ctrlFlash(true);await new Promise(r=>setTimeout(r,onT));await ctrlFlash(false);await new Promise(r=>setTimeout(r,offT))}await ctrlFlash(false)};
        
        useEffect(()=>{if(m==='audience'&&cmd&&t){if(cmd.t==='seq')execSeq(cmd.s);else if(cmd.t==='stop')ctrlFlash(false)}},[cmd,m,t]);
        
        const addSeq=()=>setSeqs([...seqs,{id:Date.now(),preset:'medium',loc:'all',dur:5}]);
        const updSeq=(id,f,v)=>setSeqs(seqs.map(s=>s.id===id?{...s,[f]:v}:s));
        const delSeq=(id)=>setSeqs(seqs.filter(s=>s.id!==id));
        const saveSeqs=()=>{if(!name.trim()||!seqs.length)return alert('Need name & steps');const n={id:Date.now(),name:name.trim(),steps:[...seqs],created:new Date().toISOString()};const u=[...saved,n];setSaved(u);localStorage.setItem('pm-seqs',JSON.stringify(u));setName('');alert('Saved!')};
        const loadSeq=(s)=>{setSeqs(s.steps.map(st=>({...st,id:Date.now()+Math.random()})));setName(s.name);setTab('build')};
        const delSaved=(id)=>{if(confirm('Delete?')){const u=saved.filter(s=>s.id!==id);setSaved(u);localStorage.setItem('pm-seqs',JSON.stringify(u))}};
        const runSeqs=async()=>{setRun(true);runRef.current=true;for(const s of seqs){if(!runRef.current)break;send({t:'seq',s});await new Promise(r=>setTimeout(r,(s.dur+1)*1000))}setRun(false);runRef.current=false};
        const runSaved=async(sv)=>{setRun(true);runRef.current=true;for(const s of sv.steps){if(!runRef.current)break;send({t:'seq',s});await new Promise(r=>setTimeout(r,(s.dur+1)*1000))}setRun(false);runRef.current=false};
        const stop=()=>{runRef.current=false;send({t:'stop'});setRun(false)};
        
        if(!c)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'radial-gradient(ellipse at center,#4a0e0e 0%,#1a0000 50%,#000 100%)'}}>Connecting...</div>;
        
        if(m==='choose')return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'radial-gradient(ellipse at center,#4a0e0e 0%,#1a0000 50%,#000 100%)',padding:'20px'}}><div style={{maxWidth:'500px',width:'100%',textAlign:'center'}}><h1 style={{fontSize:'48px',marginBottom:'10px',letterSpacing:'0.15em',textShadow:'0 0 10px rgba(255,255,255,0.5)'}}>THE PHIL MITCHELL</h1><h2 style={{fontSize:'36px',letterSpacing:'0.15em'}}>RADIO HOUR</h2><p style={{color:'#00ff64',margin:'30px 0',fontSize:'14px'}}>🔴 LIVE • {a} CONNECTED</p><button onClick={()=>setM('audience')} style={{width:'100%',padding:'25px',margin:'10px 0',background:'linear-gradient(135deg,#8b0000,#4a0000)',border:'2px solid rgba(139,0,139,0.5)',borderRadius:'8px',color:'#fff',fontSize:'18px',cursor:'pointer',fontFamily:'Cinzel'}}>JOIN CONGREGATION</button><button onClick={()=>setM('control')} style={{width:'100%',padding:'25px',background:'linear-gradient(135deg,#8b0000,#4a0000)',border:'2px solid rgba(139,0,139,0.5)',borderRadius:'8px',color:'#fff',fontSize:'18px',cursor:'pointer',fontFamily:'Cinzel'}}>PREACHER CONTROLS</button></div></div>;
        
        if(m==='audience'){if(!t)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'radial-gradient(ellipse at center,#4a0e0e 0%,#1a0000 50%,#000 100%)',padding:'20px'}}><div style={{maxWidth:'500px',width:'100%',textAlign:'center'}}><h1 style={{fontSize:'32px',marginBottom:'20px'}}>PREPARE FOR THE RAPTURE</h1><p style={{color:'rgba(255,255,255,0.7)',marginBottom:'40px'}}>Activate your flashlight during the broadcast</p><button onClick={reqFlash} style={{width:'100%',padding:'20px',background:'linear-gradient(135deg,#8b0000,#4a0000)',border:'2px solid rgba(139,0,139,0.5)',borderRadius:'8px',color:'#fff',fontSize:'18px',cursor:'pointer',fontFamily:'Cinzel'}}>RECEIVE SIGNAL</button><button onClick={()=>setM('choose')} style={{marginTop:'20px',background:'none',border:'none',color:'rgba(255,255,255,0.4)',cursor:'pointer'}}>Return</button></div></div>;return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'radial-gradient(ellipse at center,#4a0e0e 0%,#1a0000 50%,#000 100%)',padding:'20px'}}><div style={{textAlign:'center'}}><div style={{width:'150px',height:'150px',margin:'0 auto 40px',borderRadius:'50%',background:flash?'radial-gradient(circle,rgba(255,215,0,0.8),rgba(139,0,139,0.4))':'radial-gradient(circle,rgba(139,0,139,0.2),transparent)',display:'flex',alignItems:'center',justifyContent:'center',border:flash?'3px solid rgba(255,215,0,0.5)':'3px solid rgba(139,0,139,0.3)'}}>⚡</div><h2 style={{fontSize:'28px',marginBottom:'10px'}}>CONNECTED</h2><p style={{color:'rgba(255,255,255,0.6)'}}>Awaiting transmission...</p></div></div>}
        
        if(m==='control'){if(!auth)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'radial-gradient(ellipse at center,#4a0e0e 0%,#1a0000 50%,#000 100%)',padding:'20px'}}><div style={{maxWidth:'400px',width:'100%'}}><h1 style={{fontSize:'24px',marginBottom:'40px',textAlign:'center'}}>BROADCAST CONTROLS</h1><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyPress={e=>e.key==='Enter'&&pw==='rapture'&&setAuth(true)} placeholder="Password" style={{width:'100%',padding:'15px',background:'rgba(0,0,0,0.6)',border:'2px solid rgba(139,0,139,0.3)',color:'#fff',borderRadius:'4px',textAlign:'center',fontFamily:'Cinzel'}}/><button onClick={()=>pw==='rapture'?setAuth(true):alert('Wrong password')} style={{width:'100%',marginTop:'20px',padding:'15px',background:'linear-gradient(135deg,#8b0000,#4a0000)',border:'2px solid rgba(139,0,139,0.5)',borderRadius:'8px',color:'#fff',fontSize:'16px',cursor:'pointer',fontFamily:'Cinzel'}}>BEGIN TRANSMISSION</button></div></div>;
        
        return <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at center,#4a0e0e 0%,#1a0000 50%,#000 100%)',padding:'20px'}}><div style={{maxWidth:'700px',margin:'0 auto'}}><div style={{background:'rgba(0,0,0,0.5)',border:'2px solid rgba(139,0,139,0.3)',borderRadius:'8px',padding:'30px',marginBottom:'20px'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}><h1 style={{fontSize:'24px'}}>BROADCAST CONTROLS</h1><span style={{padding:'8px 16px',borderRadius:'20px',fontSize:'12px',background:run?'rgba(139,0,139,0.4)':'rgba(100,100,100,0.3)',border:run?'1px solid rgba(139,0,139,0.8)':'1px solid rgba(100,100,100,0.5)'}}>{run?'BROADCASTING':'IDLE'}</span></div><p style={{color:'rgba(255,255,255,0.5)',fontSize:'14px'}}>The Phil Mitchell Radio Hour</p></div><div style={{background:'rgba(0,0,0,0.5)',border:'2px solid rgba(0,255,100,0.3)',borderRadius:'6px',padding:'15px',textAlign:'center',marginBottom:'20px'}}><div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'15px'}}><span>👥</span><div style={{fontSize:'36px',fontWeight:'bold',color:'#00ff64'}}>{a}</div></div><div style={{color:'rgba(255,255,255,0.6)',fontSize:'12px'}}>CONGREGATION MEMBERS</div></div><div style={{background:'rgba(0,0,0,0.5)',border:'2px solid rgba(139,0,139,0.3)',borderRadius:'8px',padding:'30px'}}><div style={{display:'flex',gap:'10px',marginBottom:'20px',borderBottom:'2px solid rgba(139,0,139,0.3)'}}><button onClick={()=>setTab('build')} style={{padding:'12px 20px',background:'none',border:'none',color:tab==='build'?'#fff':'rgba(255,255,255,0.5)',borderBottom:tab==='build'?'2px solid rgba(139,0,139,0.8)':'2px solid transparent',marginBottom:'-2px',cursor:'pointer',fontFamily:'Cinzel',fontSize:'14px'}}>BUILD SEQUENCE</button><button onClick={()=>setTab('library')} style={{padding:'12px 20px',background:'none',border:'none',color:tab==='library'?'#fff':'rgba(255,255,255,0.5)',borderBottom:tab==='library'?'2px solid rgba(139,0,139,0.8)':'2px solid transparent',marginBottom:'-2px',cursor:'pointer',fontFamily:'Cinzel',fontSize:'14px'}}>SAVED SEQUENCES</button></div>{tab==='build'?(<div><div style={{display:'flex',justifyContent:'space-between',marginBottom:'20px'}}><h2 style={{fontSize:'18px'}}>SEQUENCE BUILDER</h2><button onClick={addSeq} disabled={run} style={{padding:'8px 16px',background:'rgba(139,0,0,0.3)',border:'1px solid rgba(139,0,139,0.3)',borderRadius:'4px',fontSize:'12px',cursor:run?'not-allowed':'pointer',fontFamily:'Cinzel',opacity:run?0.5:1}}>+ Add Step</button></div>{seqs.length===0?<p style={{textAlign:'center',padding:'20px',color:'rgba(255,255,255,0.5)',fontSize:'14px'}}>No steps programmed</p>:<div style={{maxHeight:'400px',overflowY:'auto',marginBottom:'20px'}}>{seqs.map((sq,i)=><div key={sq.id} style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(139,0,139,0.3)',borderRadius:'6px',padding:'15px',marginBottom:'10px'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:'15px'}}><span style={{color:'rgba(255,255,255,0.7)',fontSize:'12px'}}>STEP {i+1}</span><button onClick={()=>delSeq(sq.id)} disabled={run} style={{background:'none',border:'none',color:'rgba(139,0,0,0.7)',cursor:run?'not-allowed':'pointer',opacity:run?0.5:1}}>🗑</button></div><div style={{marginBottom:'15px'}}><label style={{display:'block',color:'rgba(255,255,255,0.7)',fontSize:'12px',marginBottom:'10px'}}>Frequency Preset</label><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}}>{Object.entries(PRESETS).map(([k,p])=><button key={k} onClick={()=>updSeq(sq.id,'preset',k)} disabled={run} style={{background:sq.preset===k?'rgba(139,0,139,0.3)':'rgba(139,0,0,0.2)',border:sq.preset===k?'2px solid rgba(139,0,139,0.7)':'2px solid rgba(139,0,139,0.3)',padding:'10px',borderRadius:'4px',fontSize:'11px',cursor:run?'not-allowed':'pointer',fontFamily:'Cinzel',opacity:run?0.5:1}}>{p.l}</button>)}</div></div><div style={{marginBottom:'15px'}}><label style={{display:'block',color:'rgba(255,255,255,0.7)',fontSize:'12px',marginBottom:'8px'}}>Location Pattern</label><select value={sq.loc} onChange={e=>updSeq(sq.id,'loc',e.target.value)} disabled={run} style={{width:'100%',padding:'10px',background:'rgba(0,0,0,0.6)',border:'2px solid rgba(139,0,139,0.3)',color:'#fff',borderRadius:'4px',fontFamily:'Cinzel',opacity:run?0.5:1}}><option value="all">All Devices</option><option value="wave">Wave</option><option value="random-50">Random 50%</option><option value="random-25">Random 25%</option></select></div><div><label style={{display:'block',color:'rgba(255,255,255,0.7)',fontSize:'12px',marginBottom:'8px'}}>Duration: {sq.dur}s</label><input type="range" min="1" max="300" value={sq.dur} onChange={e=>updSeq(sq.id,'dur',parseInt(e.target.value))} disabled={run} style={{width:'100%',opacity:run?0.5:1}}/></div></div>)}</div>}{seqs.length>0&&<div><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Sequence name" disabled={run} style={{width:'100%',padding:'12px',background:'rgba(0,0,0,0.6)',border:'2px solid rgba(139,0,139,0.3)',color:'#fff',borderRadius:'4px',marginBottom:'15px',fontFamily:'Cinzel',opacity:run?0.5:1}}/><div style={{display:'grid',gridTemplateColumns:run?'2fr 1fr':'1fr 1fr',gap:'10px'}}>{!run&&<button onClick={saveSeqs} style={{padding:'12px',background:'rgba(139,0,139,0.2)',border:'1px solid rgba(139,0,139,0.4)',borderRadius:'4px',fontSize:'14px',cursor:'pointer',fontFamily:'Cinzel'}}>💾 Save Sequence</button>}{run?<button onClick={stop} style={{padding:'12px',background:'linear-gradient(135deg,#8b0000,#4a0000)',border:'2px solid rgba(255,0,0,0.6)',borderRadius:'4px',color:'#fff',fontSize:'14px',cursor:'pointer',fontFamily:'Cinzel'}}>⏹ STOP</button>:<button onClick={runSeqs} style={{padding:'12px',background:'linear-gradient(135deg,#8b0000,#4a0000)',border:'2px solid rgba(139,0,139,0.5)',borderRadius:'4px',color:'#fff',fontSize:'14px',cursor:'pointer',fontFamily:'Cinzel'}}>▶ Run Sequence</button>}</div></div>}</div>):(<div><h2 style={{fontSize:'18px',marginBottom:'20px'}}>SAVED SEQUENCES</h2>{saved.length===0?<p style={{textAlign:'center',padding:'40px',color:'rgba(255,255,255,0.5)',fontSize:'14px'}}>No saved sequences</p>:<div style={{maxHeight:'500px',overflowY:'auto'}}>{saved.map(sv=><div key={sv.id} style={{background:'rgba(0,0,0,0.5)',border:'2px solid rgba(139,0,139,0.4)',borderRadius:'6px',padding:'15px',marginBottom:'10px'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:'10px'}}><div><h3 style={{fontSize:'16px',marginBottom:'5px'}}>{sv.name}</h3><p style={{fontSize:'12px',color:'rgba(255,255,255,0.5)'}}>{sv.steps.length} steps</p></div><button onClick={()=>delSaved(sv.id)} disabled={run} style={{background:'none',border:'none',color:'rgba(139,0,0,0.7)',cursor:run?'not-allowed':'pointer',opacity:run?0.5:1}}>🗑</button></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginTop:'15px'}}><button onClick={()=>loadSeq(sv)} disabled={run} style={{padding:'10px',background:'rgba(139,0,139,0.2)',border:'1px solid rgba(139,0,139,0.4)',borderRadius:'4px',fontSize:'12px',cursor:run?'not-allowed':'pointer',fontFamily:'Cinzel',opacity:run?0.5:1}}>Load & Edit</button><button onClick={()=>runSaved(sv)} disabled={run} style={{padding:'10px',background:'linear-gradient(135deg,#8b0000,#4a0000)',border:'2px solid rgba(139,0,139,0.5)',borderRadius:'4px',color:'#fff',fontSize:'12px',cursor:run?'not-allowed':'pointer',fontFamily:'Cinzel',opacity:run?0.5:1}}>▶ Run Now</button></div></div>)}</div>}</div>)}</div><button onClick={()=>{setAuth(false);setPw('');setM('choose')}} style={{width:'100%',marginTop:'20px',background:'none',border:'none',color:'rgba(255,255,255,0.4)',cursor:'pointer',fontSize:'14px',fontFamily:'Cinzel',padding:'15px'}}>End Transmission</button></div></div>}};
        
        setTimeout(()=>ReactDOM.render(<App/>,document.getElementById('root')),500);
    </script>
</body>
</html>
